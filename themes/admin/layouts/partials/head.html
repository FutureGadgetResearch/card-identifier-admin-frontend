<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}</title>
<meta name="description" content="{{ .Site.Params.description }}">

<!-- Bootstrap 5 -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<!-- Bootstrap Icons -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<!-- Custom styles -->
<link rel="stylesheet" href="{{ "css/app.css" | relURL }}">

<!-- Firebase config injected at build time from hugo.toml / HUGO_PARAMS_* env vars -->
<script>
  window.FIREBASE_CONFIG = {
    apiKey:            "{{ .Site.Params.firebase.api.key }}",
    authDomain:        "{{ .Site.Params.firebase.auth.domain }}",
    projectId:         "{{ .Site.Params.firebase.project.id }}",
    storageBucket:     "{{ .Site.Params.firebase.storage.bucket }}",
    messagingSenderId: "{{ .Site.Params.firebase.messaging.sender.id }}",
    appId:             "{{ .Site.Params.firebase.app.id }}",
  };
  window.ALLOWED_EMAILS = {{ split .Site.Params.allowed.emails "," | jsonify }};
  window.DATA_CONFIG = {
    gcsBucket:      "{{ .Site.Params.gcs.data.bucket }}",
    githubDataRepo: "{{ .Site.Params.github.data.repo }}",
  };
</script>
