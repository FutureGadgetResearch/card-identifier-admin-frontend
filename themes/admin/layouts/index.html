{{ define "main" }}
<div class="row justify-content-center mt-5">
  <div class="col-md-5 col-lg-4">
    <div class="card shadow-sm border-0">
      <div class="card-body p-4">
        <div class="text-center mb-4">
          <i class="bi bi-grid fs-1 text-primary"></i>
          <h1 class="h4 mt-2 mb-1">{{ .Site.Title }}</h1>
          <p class="text-muted small">{{ .Site.Params.description }}</p>
        </div>

        <!-- Sign-in section -->
        <div id="auth-section">
          <div id="auth-error" class="alert alert-danger py-2 small d-none"></div>
          <div class="d-grid">
            <button class="btn btn-outline-dark" onclick="signInWithGoogle()">
              <svg class="me-2" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 48 48">
                <path fill="#FFC107" d="M43.611 20.083H42V20H24v8h11.303c-1.649 4.657-6.08 8-11.303 8c-6.627 0-12-5.373-12-12s5.373-12 12-12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4C12.955 4 4 12.955 4 24s8.955 20 20 20s20-8.955 20-20c0-1.341-.138-2.65-.389-3.917z"/>
                <path fill="#FF3D00" d="m6.306 14.691l6.571 4.819C14.655 15.108 18.961 12 24 12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4C16.318 4 9.656 8.337 6.306 14.691z"/>
                <path fill="#4CAF50" d="M24 44c5.166 0 9.86-1.977 13.409-5.192l-6.19-5.238A11.91 11.91 0 0 1 24 36c-5.202 0-9.619-3.317-11.283-7.946l-6.522 5.025C9.505 39.556 16.227 44 24 44z"/>
                <path fill="#1976D2" d="M43.611 20.083H42V20H24v8h11.303a12.04 12.04 0 0 1-4.087 5.571l.003-.002l6.19 5.238C36.971 39.205 44 34 44 24c0-1.341-.138-2.65-.389-3.917z"/>
              </svg>
              Sign in with Google
            </button>
          </div>
        </div>

        <!-- Signed-in state -->
        <div id="signed-in-section" class="text-center d-none">
          <p class="text-success small mb-3">
            <i class="bi bi-check-circle me-1"></i>Signed in as <strong id="home-user-email"></strong>
          </p>
          <div class="d-grid gap-2">
            <a id="btn-go-items" href="{{ "items/" | relURL }}" class="btn btn-primary">
              <i class="bi bi-list-ul me-1"></i>Go to Items
            </a>
            <p id="admin-hint" class="text-muted small mb-0 d-none">
              <i class="bi bi-lock me-1"></i>You need admin access to use this app.
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{{ end }}

{{ define "page-scripts" }}
<script>
  firebase.auth().onAuthStateChanged(user => {
    if (user) {
      document.getElementById('auth-section').classList.add('d-none');
      document.getElementById('signed-in-section').classList.remove('d-none');
      document.getElementById('home-user-email').textContent = user.email;

      if (!isEmailAllowed(user.email)) {
        const btn = document.getElementById('btn-go-items');
        btn.removeAttribute('href');
        btn.classList.add('disabled');
        document.getElementById('admin-hint').classList.remove('d-none');
      }
    } else {
      document.getElementById('auth-section').classList.remove('d-none');
      document.getElementById('signed-in-section').classList.add('d-none');
    }
  });
</script>
{{ end }}
