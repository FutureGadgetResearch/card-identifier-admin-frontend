{{ define "main" }}
<div class="d-flex align-items-center justify-content-between mb-4">
  <h2 class="h5 mb-0 fw-semibold">{{ .Title }}</h2>
  <button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#itemModal" onclick="openCreateModal()">
    <i class="bi bi-plus-lg me-1"></i>New Item
  </button>
</div>

<!-- Auth guard banner -->
<div id="auth-guard" class="alert alert-warning d-none">
  <i class="bi bi-lock me-1"></i>You must be <a href="{{ "" | relURL }}">signed in</a> to manage items.
</div>

<!-- Loading state -->
<div id="loading" class="text-center py-5">
  <div class="spinner-border text-primary" role="status"></div>
</div>

<!-- Empty state -->
<div id="empty-state" class="text-center py-5 d-none">
  <i class="bi bi-inbox fs-1 text-muted"></i>
  <p class="text-muted mt-2">No items yet. Add your first one!</p>
</div>

<!-- Items table -->
<div class="card shadow-sm border-0 d-none" id="items-card">
  <div class="card-body p-0">
    <div class="table-responsive">
      <table class="table table-hover align-middle mb-0">
        <thead class="table-light">
          <tr>
            <th class="ps-3">Name</th>
            <th>Description</th>
            <th class="text-end pe-3">Actions</th>
          </tr>
        </thead>
        <tbody id="items-tbody"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- Create / Edit Modal -->
<div class="modal fade" id="itemModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content border-0 shadow">
      <div class="modal-header border-0 pb-0">
        <h5 class="modal-title" id="modal-title">New Item</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="item-id">
        <div class="mb-3">
          <label class="form-label small fw-medium" for="item-name">Name</label>
          <input type="text" class="form-control" id="item-name" placeholder="Item name" required>
        </div>
        <div class="mb-3">
          <label class="form-label small fw-medium" for="item-description">Description</label>
          <textarea class="form-control" id="item-description" rows="3" placeholder="Optional description"></textarea>
        </div>
        <div id="modal-error" class="alert alert-danger py-2 small d-none"></div>
      </div>
      <div class="modal-footer border-0 pt-0">
        <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-primary btn-sm" id="modal-save-btn" onclick="saveItem()">Save</button>
      </div>
    </div>
  </div>
</div>

<!-- Delete confirm modal -->
<div class="modal fade" id="deleteModal" tabindex="-1">
  <div class="modal-dialog modal-sm">
    <div class="modal-content border-0 shadow">
      <div class="modal-body text-center pt-4">
        <i class="bi bi-trash3 fs-2 text-danger"></i>
        <p class="mt-2 mb-1 fw-medium">Delete this item?</p>
        <p class="text-muted small">This cannot be undone.</p>
      </div>
      <div class="modal-footer border-0 justify-content-center pt-0 pb-3">
        <button class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-danger btn-sm" id="confirm-delete-btn">Delete</button>
      </div>
    </div>
  </div>
</div>
{{ end }}

{{ define "page-scripts" }}
<script>
  // TODO: Replace /items with your actual backend resource path.
  const RESOURCE_PATH = '/items';

  const itemModal   = new bootstrap.Modal(document.getElementById('itemModal'));
  const deleteModal = new bootstrap.Modal(document.getElementById('deleteModal'));

  firebase.auth().onAuthStateChanged(async user => {
    if (!user) {
      document.getElementById('loading').classList.add('d-none');
      document.getElementById('auth-guard').classList.remove('d-none');
      return;
    }
    await loadItems();
  });

  async function loadItems() {
    try {
      const items = await api('GET', RESOURCE_PATH);
      document.getElementById('loading').classList.add('d-none');
      if (!items || items.length === 0) {
        document.getElementById('empty-state').classList.remove('d-none');
        return;
      }
      renderItems(items);
      document.getElementById('items-card').classList.remove('d-none');
    } catch (e) {
      document.getElementById('loading').classList.add('d-none');
      showToast('Failed to load items: ' + e.message, 'danger');
    }
  }

  function renderItems(items) {
    const tbody = document.getElementById('items-tbody');
    tbody.innerHTML = items.map(item => `
      <tr>
        <td class="ps-3 fw-medium">${escHtml(item.name)}</td>
        <td class="text-muted">${escHtml(item.description || '—')}</td>
        <td class="text-end pe-3">
          <button class="btn btn-sm btn-outline-secondary me-1" onclick='openEditModal(${JSON.stringify(item)})'>
            <i class="bi bi-pencil"></i>
          </button>
          <button class="btn btn-sm btn-outline-danger" onclick="openDeleteModal('${item.id}')">
            <i class="bi bi-trash3"></i>
          </button>
        </td>
      </tr>
    `).join('');
  }

  function openCreateModal() {
    document.getElementById('modal-title').textContent = 'New Item';
    document.getElementById('item-id').value = '';
    document.getElementById('item-name').value = '';
    document.getElementById('item-description').value = '';
    document.getElementById('modal-error').classList.add('d-none');
  }

  function openEditModal(item) {
    document.getElementById('modal-title').textContent = 'Edit Item';
    document.getElementById('item-id').value = item.id;
    document.getElementById('item-name').value = item.name;
    document.getElementById('item-description').value = item.description || '';
    document.getElementById('modal-error').classList.add('d-none');
    itemModal.show();
  }

  async function saveItem() {
    const id          = document.getElementById('item-id').value;
    const name        = document.getElementById('item-name').value.trim();
    const description = document.getElementById('item-description').value.trim();
    const errEl       = document.getElementById('modal-error');
    errEl.classList.add('d-none');

    if (!name) {
      errEl.textContent = 'Name is required.';
      errEl.classList.remove('d-none');
      return;
    }

    const btn = document.getElementById('modal-save-btn');
    btn.disabled = true;
    try {
      if (id) {
        await api('PUT', `${RESOURCE_PATH}/${id}`, { name, description });
      } else {
        await api('POST', RESOURCE_PATH, { name, description });
      }
      itemModal.hide();
      await loadItems();
      document.getElementById('empty-state').classList.add('d-none');
      document.getElementById('items-card').classList.remove('d-none');
    } catch (e) {
      errEl.textContent = e.message;
      errEl.classList.remove('d-none');
    } finally {
      btn.disabled = false;
    }
  }

  let pendingDeleteId = null;

  function openDeleteModal(id) {
    pendingDeleteId = id;
    deleteModal.show();
  }

  document.getElementById('confirm-delete-btn').addEventListener('click', async () => {
    if (!pendingDeleteId) return;
    try {
      await api('DELETE', `${RESOURCE_PATH}/${pendingDeleteId}`);
      deleteModal.hide();
      await loadItems();
    } catch (e) {
      showToast('Delete failed: ' + e.message, 'danger');
    }
  });

  function escHtml(str) {
    const d = document.createElement('div');
    d.appendChild(document.createTextNode(str));
    return d.innerHTML;
  }
</script>
{{ end }}
